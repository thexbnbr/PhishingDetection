<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phishing Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --green: #00ff88;
      --green-dim: rgba(0, 255, 136, 0.08);
      --red: #ff3b5c;
      --red-dim: rgba(255, 59, 92, 0.08);
      --accent: #5b5bd6;
      --font-mono: 'Space Mono', monospace;
      --font-sans: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 60% 20%, rgba(91, 91, 214, 0.06) 0%, transparent 60%),
                  radial-gradient(ellipse at 20% 80%, rgba(0, 255, 136, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 640px;
      position: relative;
      z-index: 1;
    }

    header {
      margin-bottom: 3rem;
      animation: fadeUp 0.6s ease both;
    }

    .badge {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .badge::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease infinite;
    }

    h1 {
      font-family: var(--font-mono);
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
      line-height: 1.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]::placeholder { color: var(--muted); }

    input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91, 91, 214, 0.1);
    }

    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.85rem 1.5rem;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
      letter-spacing: 0.05em;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .result {
      margin-top: 1.5rem;
      border-radius: 12px;
      padding: 1.5rem;
      display: none;
      animation: fadeUp 0.3s ease both;
    }

    .result.phishing {
      background: var(--red-dim);
      border: 1px solid rgba(255, 59, 92, 0.2);
      display: block;
    }

    .result.legitime {
      background: var(--green-dim);
      border: 1px solid rgba(0, 255, 136, 0.2);
      display: block;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .verdict {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .result.phishing .verdict { color: var(--red); }
    .result.legitime .verdict { color: var(--green); }

    .verdict-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
    }

    .result.phishing .verdict-icon { background: rgba(255, 59, 92, 0.15); }
    .result.legitime .verdict-icon { background: rgba(0, 255, 136, 0.15); }

    .confidence-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }

    .confidence-bar-wrap {
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      height: 6px;
      overflow: hidden;
    }

    .confidence-bar {
      height: 100%;
      border-radius: 99px;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
      width: 0%;
    }

    .result.phishing .confidence-bar { background: var(--red); }
    .result.legitime .confidence-bar { background: var(--green); }

    .confidence-value {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.4rem;
    }

    .url-display {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      word-break: break-all;
    }

    .loading {
      display: none;
      margin-top: 1.5rem;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      color: var(--muted);
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
    }

    .loading.visible { display: flex; }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s ease infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    footer {
      margin-top: 2.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      animation: fadeUp 0.6s 0.2s ease both;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="badge">ML · Cybersecurity · v1.0</div>
      <h1>Phishing<br><span>Detector</span></h1>
      <p class="subtitle">Paste any URL to instantly check if it's a phishing attempt.<br>Powered by a Random Forest trained on 550K URLs.</p>
    </header>

    <div class="card">
      <div class="input-group">
        <label>URL to analyze</label>
        <div class="input-row">
          <input type="text" id="urlInput" placeholder="https://example.com" />
          <button id="analyzeBtn" onclick="analyze()">Analyze</button>
        </div>
      </div>

      <div class="loading" id="loading">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <span>Analyzing...</span>
      </div>

      <div class="result" id="result">
        <div class="result-header">
          <div class="verdict">
            <div class="verdict-icon" id="verdictIcon"></div>
            <span id="verdictText"></span>
          </div>
        </div>
        <div class="confidence-label">Confidence score</div>
        <div class="confidence-bar-wrap">
          <div class="confidence-bar" id="confidenceBar"></div>
        </div>
        <div class="confidence-value" id="confidenceValue"></div>
        <div class="url-display" id="urlDisplay"></div>
      </div>
    </div>

    <footer>
      Built by <a href="https://github.com/thexbnbr" target="_blank">@thexbnbr</a> ·
      <a href="https://github.com/thexbnbr/PhishingDetection" target="_blank">GitHub</a>
    </footer>
  </div>

  <script>
    const input = document.getElementById('urlInput');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });

    async function analyze() {
      const url = input.value.trim();
      if (!url) return;

      const btn = document.getElementById('analyzeBtn');
      const loading = document.getElementById('loading');
      const result = document.getElementById('result');

      btn.disabled = true;
      loading.classList.add('visible');
      result.className = 'result';

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await res.json();

        const isPhishing = data.verdict === 'PHISHING';
        result.classList.add(isPhishing ? 'phishing' : 'legitime');

        document.getElementById('verdictIcon').textContent = isPhishing ? '✕' : '✓';
        document.getElementById('verdictText').textContent = isPhishing ? 'Phishing detected' : 'Legitimate URL';
        document.getElementById('confidenceValue').textContent = `${data.confiance}% confidence`;
        document.getElementById('urlDisplay').textContent = data.url;

        setTimeout(() => {
          document.getElementById('confidenceBar').style.width = data.confiance + '%';
        }, 50);

      } catch (e) {
        result.classList.add('phishing');
        document.getElementById('verdictIcon').textContent = '!';
        document.getElementById('verdictText').textContent = 'API unreachable';
        document.getElementById('confidenceValue').textContent = 'Make sure the API is running on port 8000';
        document.getElementById('urlDisplay').textContent = '';
      }

      loading.classList.remove('visible');
      btn.disabled = false;
    }
  </script>
</body>
</html>
